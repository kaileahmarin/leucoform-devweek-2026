name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package and development tools
        run: python -m pip install --upgrade pip ".[dev,desktop]"

      - name: Check formatting
        run: python -m ruff format --check .

      - name: Lint
        run: python -m ruff check .

      - name: Type check
        run: python -m mypy

      - name: Run tests
        run: python -m pytest

      - name: Check documentation links
        run: python scripts/check_docs.py

      - name: Check receipt minimisation
        run: python scripts/minimisation_lint.py

      - name: Build distributions
        run: python -m build

      - name: Verify built artifacts and clean installation
        run: python scripts/verify_release.py
